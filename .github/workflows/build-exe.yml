name: Build exe on Windows

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build exe (include mgrs binaries)
        run: |
          pyinstaller ^
            --onefile ^
            --windowed ^
            --name converter ^
            --collect-binaries mgrs ^
            --collect-submodules mgrs ^
            --collect-binaries pyproj ^
            --collect-submodules pyproj ^
            app.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: converter-windows
          path: dist/converter.exe